version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: yugioh_db
    environment:
      POSTGRES_USER: yugioh_user
      POSTGRES_PASSWORD: yugioh_pass
      POSTGRES_DB: yugioh_championships
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yugioh_user -d yugioh_championships"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: yugioh_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@yugioh.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
